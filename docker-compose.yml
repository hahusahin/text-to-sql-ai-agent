services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ttsql_postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_local_dev
      POSTGRES_DB: manufacturing
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d manufacturing"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
