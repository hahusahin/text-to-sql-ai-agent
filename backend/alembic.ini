[alembic]
# Where our hand-written migration scripts live (relative to this file).
script_location = db/migrations

# Make the `app` package importable from env.py (so we can reuse app.core.config).
prepend_sys_path = .

# Version file names get a date prefix + slug, e.g. 20260626_a1b2c3_catalog_tables.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# The DB URL is NOT set here; env.py reads it from our .env via app.core.config.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
